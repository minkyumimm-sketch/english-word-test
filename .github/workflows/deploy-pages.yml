name: Deploy to GitHub Pages

# アプリ本体（index.html / css / js / lib）のみをステージングしてGitHub Pagesへ
# 公開する。Data/（単語データExcel）・docs/・README.md等はステージング対象に
# 含めないため、公開サイトからは配信されない（教材データを非公開に保つため）。
on:
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "css/**"
      - "js/**"
      - "lib/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイを避ける。実行中のデプロイはキャンセルせず完了を待つ。
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage public files only
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r css js lib _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
